<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Beca</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Registro de Postulantes</h1>
    <form id="formPostulante">
        <div class="form-group">
            <!-- Añadimos patrones (pattern) y límites (maxlength) -->
            <input type="text" id="nombres" placeholder="Nombres" required pattern="[A-Za-zÀ-ÿ\s]+" title="Solo se permiten letras">
            <input type="text" id="apellidos" placeholder="Apellidos" required pattern="[A-Za-zÀ-ÿ\s]+" title="Solo se permiten letras">
            <input type="text" id="dni" placeholder="DNI" required pattern="\d{8}" title="El DNI debe tener 8 dígitos" maxlength="8">
            <input type="email" id="correo" placeholder="ejemplo@correo.com" required title="Ingresa un correo válido (ejemplo: usuario@dominio.com)">
            <input type="text" id="celular" placeholder="Celular" required pattern="\d{9}" title="El celular debe tener 9 dígitos" maxlength="9">
            <input type="number" id="edad" placeholder="Edad" required min="16" max="100">
            <input type="text" id="institucion" placeholder="Institución Educativa" required>
            <input type="number" id="promedio" placeholder="Promedio Académico (0-20)" step="0.1" min="0" max="20" required>
            
            <!-- Añadimos required a los select para asegurar que elijan una opción -->
            <div class="input-container">
                <span class="label-sutil">Sexo</span>
                <select id="sexo_id" required>
                    <option value="">Seleccione...</option>
                </select>
            </div>

            <div class="input-container">
                <span class="label-sutil">Grado Académico</span>
                <select id="grado_id" required>
                    <option value="">Seleccione...</option>
                </select>
            </div>

            <div class="input-container">
                <span class="label-sutil">Carrera de Interés</span>
                <select id="carrera_id" required>
                    <option value="">Seleccione...</option>
                </select>
            </div>

            <div class="input-container">
                <span class="label-sutil">Modalidad de Estudio</span>
                <select id="modalidad_id" required>
                    <option value="">Seleccione...</option>
                </select>
            </div>

            <textarea id="observaciones" placeholder="Observaciones"></textarea>
            
            <button type="submit">Registrar Postulante</button>
        </div>
    </form>

    <hr>
    <h2>Postulantes registrados</h2>
    
    <label>Filtrar por sexo:</label>
    <select id="filtroSexo">
        <option value="">Todos</option>
    </select>
    
    <table id="tablaPostulantes" border="1">
        <thead>
            <tr>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>DNI</th>
                <th>Correo</th>
                <th>Celular</th>
                <th>Edad</th>
                <th>Sexo</th>
                <th>Institución</th>
                <th>Promedio</th>
                <th>Grado</th>
                <th>Carrera</th>
                <th>Modalidad</th>
                <th>Observaciones</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
